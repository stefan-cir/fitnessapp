openapi: 3.1.0
info:
  title: Fitness Progress Hub API
  version: 1.0.0
paths:
  /api/dashboard:
    get:
      summary: Get unified dashboard payload
      responses:
        '200':
          description: Dashboard data
  /api/nutrition/sync:
    post:
      summary: Sync nutrition data from OpenFoodFacts
      responses:
        '200':
          description: Nutrition sync complete
  /api/workouts/sync:
    post:
      summary: Sync workouts from Hevy
      responses:
        '200':
          description: Workout sync complete
  /api/goals/active:
    get:
      summary: Get active goal
      responses:
        '200':
          description: Active goal returned
    post:
      summary: Set active goal
      responses:
        '201':
          description: Goal updated and progress snapshot generated
  /api/progress/latest:
    get:
      summary: Get latest computed progress snapshot
      responses:
        '200':
          description: Latest progress snapshot
  /api/recommendations/generate:
    post:
      summary: Generate recommendations from recent trends
      responses:
        '200':
          description: Recommendations generated
        '422':
          description: Insufficient data for recommendations
  /api/recommendations/history:
    get:
      summary: Get recommendation history
      responses:
        '200':
          description: Recommendation history
